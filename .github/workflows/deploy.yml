name: Deploy index.html
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and commit index.html
        run: |
          curl -sL "https://files.catbox.moe/iprpuo.html" -o index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add School Sport Hub app"
          git push
